name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when new commits hit the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # API — FastAPI + SQLAlchemy + Alembic + pytest. Needs a real Postgres for
  # the audit-trigger and ready-probe integration tests.
  # ---------------------------------------------------------------------------
  api:
    name: api (python + postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: hha-dashboard/api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hha
          POSTGRES_PASSWORD: hha
          POSTGRES_DB: hha_dashboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Dev mode here is intentional: the existing test suite hits FastAPI
      # with Authorization: Dev <role> headers, which only the dev-stub
      # branch in app/deps.py::get_current_user accepts. ENV=ci would make
      # those tests 401 across the board (real Entra JWT verification path
      # has no test fixture). Real prod-mode CI lands with deploy-prod.yml
      # in Session 10, separately.
      ENV: dev
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://hha:hha@localhost:5432/hha_dashboard
      DATABASE_URL_SYNC: postgresql+psycopg://hha:hha@localhost:5432/hha_dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Test (pytest)
        run: uv run pytest -v

  # ---------------------------------------------------------------------------
  # Web — Next.js + biome + tsc + vitest. No DB needed.
  # ---------------------------------------------------------------------------
  web:
    name: web (next + vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: hha-dashboard/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: hha-dashboard/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (biome)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Test (vitest)
        run: npm run test

  # ---------------------------------------------------------------------------
  # Bicep — compile + lint check. No live deploy.
  # Skips cleanly if infra/ doesn't exist (early-checkout test).
  # ---------------------------------------------------------------------------
  bicep:
    name: bicep (build + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Detect infra/
        id: detect
        run: |
          if [ -f hha-dashboard/infra/main.bicep ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No infra/main.bicep on this branch — skipping bicep checks."
          fi

      - name: Install Bicep CLI
        if: steps.detect.outputs.exists == 'true'
        run: |
          curl -Lo bicep https://github.com/Azure/bicep/releases/latest/download/bicep-linux-x64
          chmod +x bicep
          sudo mv bicep /usr/local/bin/bicep
          bicep --version

      - name: Build every .bicep file
        if: steps.detect.outputs.exists == 'true'
        working-directory: hha-dashboard/infra
        run: |
          shopt -s globstar nullglob
          for f in main.bicep modules/*.bicep; do
            echo "::group::build $f"
            bicep build "$f" --outfile "/tmp/$(basename "$f" .bicep).json"
            echo "::endgroup::"
          done

      - name: Build parameter files
        if: steps.detect.outputs.exists == 'true'
        working-directory: hha-dashboard/infra
        run: |
          shopt -s nullglob
          for f in env/*.bicepparam; do
            echo "::group::build-params $f"
            bicep build-params "$f" --outfile "/tmp/$(basename "$f" .bicepparam).params.json"
            echo "::endgroup::"
          done

      - name: Lint every .bicep file
        if: steps.detect.outputs.exists == 'true'
        working-directory: hha-dashboard/infra
        run: |
          shopt -s globstar nullglob
          for f in main.bicep modules/*.bicep; do
            echo "::group::lint $f"
            bicep lint "$f"
            echo "::endgroup::"
          done
